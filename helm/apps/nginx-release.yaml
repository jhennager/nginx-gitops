apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nginx-production
  namespace: workload
spec:
  interval: 5m
  chart:
    spec:
      chart: nginx
      version: "18.2.1"
      sourceRef:
        kind: HelmRepository
        name: bitnami-charts
        namespace: workload
  kubeConfig:
    secretRef:
      name: bish-ntx-nkp-work-kubeconfig
  valuesFrom:
    - kind: ConfigMap
      name: nginx-values-cm
      valuesKey: values.yaml
