apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: nginx-helm
  namespace: kommander
spec:
  interval: 1m
  url: https://github.com/organon/nkp-config.git
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nginx-helm-sync
  namespace: kommander
spec:
  interval: 2m
  path: "./helm/apps" # Point to the workspace folder
  prune: true
  sourceRef:
    kind: GitRepository
    name: nginx-helm
    namespace: kommander